services:
  - type: web
    name: duosearch-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/duosearch_bot
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && pip install -r app/api/requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: duosearch-db
          property: connectionString
      - key: ADMIN_IDS
        value: ""
      - key: ECHO_SQL
        value: "false"
      - key: STEAM_API_KEY
        sync: false

  - type: worker
    name: duosearch-bot
    runtime: python
    repo: https://github.com/YOUR_USERNAME/duosearch_bot
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: duosearch-db
          property: connectionString
      - key: ADMIN_IDS
        value: ""
      - key: ECHO_SQL
        value: "false"
      - key: STEAM_API_KEY
        sync: false

databases:
  - name: duosearch-db
    plan: free
    region: oregon
    databaseName: duosearch
    user: duosearch
